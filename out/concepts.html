"}]},{\"id\":\"dynamic-programming\",\"name\":\"Dynamic Programming\",\"nameJa\":\"動的計画法\",\"kind\":\"アルゴ\",\"mastery\":\"復習中\",\"masteryPct\":55,\"note\":\"重複する部分問題を一度だけ解いて結果をメモすることで、指数時間の全探索を多項式時間に削減する手法。トップダウン（メモ化再帰）とボトムアップ（テーブル充填）の 2 形式がある。適用可能条件は「最適部分構造」と「重複部分問題」の 2 つ。コイン問題では $dp[i]$ を金額 $i$ を作る最小枚数として定義し、$dp[i] = \\\\min_{c \\\\in \\\\text{coins}} dp[i-c] + 1$ で遷移する。\",\"studyNote\":\"実装前に必ず紙で $dp[i]$ の定義と遷移を書く。「状態＝何を表すか」が曖昧なまま書き始めると大抵バグる。\",\"problemNumbers\":[322],\"complexity\":[{\"op\":\"一般（状態数×遷移数）\",\"avg\":\"O(n \\\\cdot k)\",\"worst\":\"O(n \\\\cdot k)\"}]},{\"id\":\"hash-table\",\"name\":\"Hash Table\",\"nameJa\":\"ハッシュ表\",\"kind\":\"構造\",\"mastery\":\"復習中\",\"masteryPct\":65,\"note\":\"キーをハッシュ関数で整数に変換し、配列の添字として使うデータ構造。平均 $O(1)$ でキーの探索・挿入・削除を行える。衝突（異なるキーが同じハッシュ値を持つ場合）はチェイン法やオープンアドレス法で解決する。最悪 $O(n)$ は全要素が同一バケットに衝突したとき。Python の `dict` と `set` はハッシュ表で実装されている。\",\"studyNote\":\"Two Sum 系問題の鍵は「残りの値が既に辞書にあるか $O(1)$ で確認する」発想。最悪 $O(n)$ の衝突は競技では無視してよい。\",\"problemNumbers\":[1,146],\"complexity\":[{\"op\":\"探索\",\"avg\":\"O(1)\",\"worst\":\"O(n)\"},{\"op\":\"挿入\",\"avg\":\"O(1)\",\"worst\":\"O(n)\"},{\"op\":\"削除\",\"avg\":\"O(1)\",\"worst\":\"O(n)\"}]},{\"id\":\"stack\",\"name\":\"Stack\",\"nameJa\":\"スタック\",\"kind\":\"構造\",\"mastery\":\"習得\",\"masteryPct\":100,\"note\":\"LIFO（後入れ先出し）の線形データ構造。末尾への追加（push）と末尾からの取り出し（pop）のみを行うため、どちらも $O(1)$。括弧の対応付けや関数呼び出しの管理など、直近の状態を記憶したい場面で使う。Python では `list` の `append`／`pop` がそのままスタックとして機能する。\",\"studyNote\":\"再帰をスタックで書き直すと呼び出しオーバーヘッドと再帰深度制限を両方回避できる。実務では深い DFS ほどこの書き換えを優先する。\",\"problemNumbers\":[20],\"complexity\":[{\"op\":\"プッシュ\",\"avg\":\"O(1)\",\"worst\":\"O(1)\"},{\"op\":\"ポップ\",\"avg\":\"O(1)\",\"worst\":\"O(1)\"},{\"op\":\"参照\",\"avg\":\"O(1)\",\"worst\":\"O(1)\"}]},{\"id\":\"two-pointers\",\"name\":\"Two Pointers\",\"nameJa\":\"二ポインタ\",\"kind\":\"アルゴ\",\"mastery\":\"復習中\",\"masteryPct\":60,\"note\":\"配列やリストの両端（または同方向）に 2 本のポインタを置き、条件に応じて移動させながら目標を探す手法。ソート済み配列の 2 数和（Two Sum II）や回文判定など、$O(n^2)$ の全探索を $O(n)$ に削減できる場面で活躍する
